<!DOCTYPE html>
<html>
<head>
    <title>VoiceTasker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Task Manager</h1>
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>
    <button onclick="location.href='/voice'">Add by Voice</button>
    <button onclick="location.href='/speak'">Speak Tasks</button>
    <ul>
        {% for task in tasks %}
            <li>{{ task[1] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
